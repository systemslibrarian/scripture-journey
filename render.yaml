services:
  - type: web
    name: scripture-journey
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: scripture-journey-db
          property: connectionString
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: EMAIL_SERVER
        sync: false
      - key: EMAIL_FROM
        sync: false

databases:
  - name: scripture-journey-db
    plan: free
    databaseName: scripture_journey
